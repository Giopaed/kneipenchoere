<!doctype html>
<html lang="de">
<head><meta charset="utf-8"><title>Form detector</title></head>
<body>
<form name="konzert-eintragen" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="konzert-eintragen">
  <input name="bot-field">
  <input name="chor">
  <input name="kontaktperson">
  <input name="email" type="email">
  <input name="telefon">
  <input name="titel">
  <input name="datum" type="date">
  <input name="uhrzeit" type="time">
  <input name="ort">
  <input name="stadt">
  <input name="link" type="url">
  <textarea name="beschreibung"></textarea>
  <input name="einverstaendnis">
</form>
</body>
</html>
