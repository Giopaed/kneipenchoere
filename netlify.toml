[build]
  publish = "."

[[redirects]]
  from = "/karte"
  to = "/Karte.html"
  status = 200

[[redirects]]
  from = "/karte/"
  to = "/Karte.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
