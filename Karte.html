  <style>
    #chor-liste {
      padding: 0 0 48px 0;
    }

    #choir-list .choir-card {
      display: grid !important;
      grid-template-columns: minmax(0, 1.12fr) minmax(260px, 0.82fr) minmax(190px, 300px) !important;
      gap: 28px !important;
      align-items: start !important;
      width: 100% !important;
      box-sizing: border-box !important;
      background: #fff !important;
      border-radius: 8px !important;
      margin: 24px 0 0 0 !important;
      padding: 32px 40px !important;
    }

    #choir-list .choir-info,
    #choir-list .choir-details {
      min-width: 0 !important;
      padding: 0 !important;
    }

    #choir-list .choir-image-wrap {
      display: flex !important;
      justify-content: flex-end !important;
      align-items: flex-start !important;
    }

    #choir-list .choir-image {
      display: block !important;
      width: 290px !important;
      max-width: 100% !important;
      height: auto !important;
      max-height: 210px !important;
      object-fit: contain !important;
      background: #fff !important;
      border-radius: 12px !important;
    }

    #choir-list .choir-image-missing {
      display: none !important;
    }

    #choir-list .choir-website {
      display: block !important;
      background-color: #ffed00 !important;
      color: #000 !important;
      font-size: 12px !important;
      line-height: 1.35 !important;
      padding: 12px 14px !important;
      text-align: center !important;
      text-decoration: none !important;
      font-weight: 800 !important;
      overflow-wrap: anywhere !important;
      word-break: break-word !important;
      margin-top: 16px !important;
    }

    #choir-list .choir-link-protocol {
      font-size: 9px !important;
      opacity: 0.7 !important;
      text-transform: lowercase !important;
      letter-spacing: 0 !important;
    }

    #choir-list .stats {
      display: flex !important;
      gap: 18px !important;
      justify-content: space-between !important;
      padding: 0 !important;
    }

    #choir-list .contact-info,
    #choir-list .contact-text {
      display: none !important;
    }

    @media (max-width: 900px) {
      #choir-list .choir-card {
        grid-template-columns: 1fr !important;
        padding: 24px 20px !important;
      }

      #choir-list .choir-image-wrap {
        justify-content: flex-start !important;
      }

      #choir-list .choir-image {
        width: 240px !important;
      }
    }
  </style>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.11.1/mapbox-gl.css" rel="stylesheet" />

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const hamburger = document.querySelector('.hamburger');
    const mainNav = document.querySelector('.main-nav');
    if (!hamburger || !mainNav) return;

    hamburger.addEventListener('click', (event) => {
      event.stopPropagation();
      const isOpen = mainNav.classList.toggle('open');
      hamburger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      hamburger.classList.toggle('active', isOpen);
      document.body.style.overflow = isOpen ? 'hidden' : '';
    });

    document.addEventListener('click', (event) => {
      const isOpen = mainNav.classList.contains('open');
      if (isOpen && !mainNav.contains(event.target) && !hamburger.contains(event.target)) {
        mainNav.classList.remove('open');
        hamburger.classList.remove('active');
        hamburger.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
      }
    });
  });
</script>
